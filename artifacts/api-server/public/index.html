<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NFT Gift Upgrader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Splash / Loading Screen -->
  <div id="splashScreen">
    <video id="splashVideo" src="loading.mov" autoplay muted playsinline loop></video>
  </div>

  <div id="app" style="display:none">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="user-info">
          <div class="avatar" id="userAvatar">👤</div>
          <span class="username" id="userName">Loading...</span>
        </div>
      </div>
      <div class="header-right">
        <button class="inv-btn" id="invBtn">🎁 Inventory <span class="inv-count" id="invCount">0</span></button>
      </div>
    </header>

    <!-- Main upgrader area -->
    <main class="main">
      <!-- Circular Spinner -->
      <div class="spinner-section">
        <svg class="spinner-svg" id="spinnerSvg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="winGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#dc2626"/>
              <stop offset="35%" stop-color="#ea580c"/>
              <stop offset="50%" stop-color="#ca8a04"/>
              <stop offset="65%" stop-color="#ea580c"/>
              <stop offset="100%" stop-color="#dc2626"/>
            </linearGradient>
            <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Dark background ring -->
          <circle cx="150" cy="150" r="125" fill="none" stroke="#dde3ec" stroke-width="28"/>
          <!-- Tick marks (drawn by JS) -->
          <g id="tickMarks"></g>
          <!-- Win zone arc (updated dynamically) -->
          <circle id="winArc" cx="150" cy="150" r="125" fill="none"
            stroke="url(#winGrad)" stroke-width="24" stroke-linecap="round"
            stroke-dasharray="0 785.4" opacity="0"
            filter="url(#arcGlow)"/>
          <!-- Inner shadow -->
          <circle cx="150" cy="150" r="109" fill="none" stroke="#e8edf3" stroke-width="10"/>
          <!-- Inner light circle -->
          <circle cx="150" cy="150" r="103" fill="#f8fafc"/>
          <circle cx="150" cy="150" r="103" fill="none" stroke="#dde3ec" stroke-width="1.5"/>
          <!-- Double chevron upgrade icon -->
          <polyline points="126,151 150,127 174,151" stroke="#f59e0b" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="126,170 150,146 174,170" stroke="#f59e0b" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Needle: 0° = pointing DOWN = win zone center -->
          <g id="needle" style="transform-origin:150px 150px">
            <line x1="150" y1="50" x2="150" y2="143" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
            <line x1="150" y1="157" x2="150" y2="255" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
            <polygon points="150,269 141,251 159,251" fill="#f59e0b"/>
            <circle cx="150" cy="150" r="7.5" fill="#f8fafc" stroke="#f59e0b" stroke-width="2.5"/>
          </g>
        </svg>
      </div>

      <!-- Panels -->
      <div class="panels">
        <!-- Bet panel -->
        <div class="panel bet-panel">
          <div class="panel-title">YOUR BET</div>
          <div class="selected-gift" id="betDisplay" onclick="openBetModal()">
            <div class="gift-placeholder">
              <div class="plus-icon">＋</div>
              <div class="placeholder-text">Select gift</div>
            </div>
          </div>
          <div class="gift-price bet-price" id="betPrice"></div>
        </div>

        <!-- Center controls -->
        <div class="center-controls">
          <div class="chance-display">
            <div class="chance-label">WIN CHANCE</div>
            <div class="chance-value" id="chanceValue">—</div>
          </div>
          <button class="upgrade-btn" id="upgradeBtn" disabled onclick="doUpgrade()">
            UPGRADE
          </button>
          <div class="luck-mode-badge" id="luckBadge" style="display:none"></div>
        </div>

        <!-- Target panel -->
        <div class="panel target-panel">
          <div class="panel-title">TARGET GIFT</div>
          <div class="selected-gift" id="targetDisplay" onclick="openTargetModal()">
            <div class="gift-placeholder">
              <div class="plus-icon">＋</div>
              <div class="placeholder-text">Select gift</div>
            </div>
          </div>
          <div class="gift-price target-price" id="targetPrice"></div>
        </div>
      </div>

      <!-- hidden, kept for backend compat -->
      <input type="hidden" id="targetUserIdInput" />
    </main>

    <!-- Result overlay -->
    <div class="result-overlay" id="resultOverlay">
      <div class="result-content" id="resultContent">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-gift" id="resultGift"></div>
        <button class="result-close-btn" onclick="closeResult()">Continue</button>
      </div>
    </div>

    <!-- Inventory Modal -->
    <div class="modal" id="invModal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">🎁 Инвентарь</span>
          <button class="modal-close" onclick="closeModal('invModal')">✕</button>
        </div>
        <div class="modal-body" id="invModalBody">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>

    <!-- Add Gift Modal -->
    <div class="modal" id="addGiftModal">
      <div class="modal-content add-gift-modal-content">
        <div class="add-gift-header">
          <button class="add-gift-close" onclick="closeModal('addGiftModal')">✕</button>
        </div>
        <div class="add-gift-body">
          <div class="add-gift-avatar-row">
            <img src="shark.png" class="add-gift-avatar" alt="upgraderbank" />
            <div class="add-gift-avatar-info">
              <div class="add-gift-avatar-label">Перейдите в профиль</div>
              <a class="add-gift-avatar-link" href="https://t.me/upgraderbank" target="_blank">@upgraderbank</a>
            </div>
          </div>
          <div class="add-gift-steps">
            <div class="add-gift-step">
              <span class="add-gift-step-emoji">😎</span>
              <span class="add-gift-step-title">Отправьте любой подарок</span>
            </div>
            <div class="add-gift-step">
              <span class="add-gift-step-emoji">😊</span>
              <span class="add-gift-step-title">Подарок отобразится в вашем инвентаре</span>
            </div>
          </div>
          <a class="add-gift-go-btn" href="https://t.me/upgraderbank" target="_blank" onclick="closeModal('addGiftModal')">Отправить подарок</a>
        </div>
      </div>
    </div>

    <!-- Bet Modal -->
    <div class="modal" id="betModal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">Select Bet Gift</span>
          <button class="modal-close" onclick="closeModal('betModal')">✕</button>
        </div>
        <div class="modal-body" id="betModalBody">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>

    <!-- Target Modal -->
    <div class="modal" id="targetModal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">Select Target Gift</span>
          <button class="modal-close" onclick="closeModal('targetModal')">✕</button>
        </div>
        <div class="search-bar">
          <input type="text" id="targetSearch" placeholder="Search gifts..." oninput="filterTargetGifts()" />
        </div>
        <div class="modal-body" id="targetModalBody">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>

    <!-- Gift Detail Modal -->
    <div class="modal" id="giftDetailModal">
      <div class="modal-content gift-detail-modal-content">
        <div class="modal-header">
          <span class="modal-title" id="giftDetailTitle">Gift</span>
          <button class="modal-close" onclick="closeModal('giftDetailModal')">✕</button>
        </div>
        <div class="gift-detail-body">
          <div class="gift-detail-img-wrap" id="giftDetailImgWrap"></div>
          <div class="gift-detail-price-row" id="giftDetailPriceRow"></div>
          <div class="gift-detail-actions">
            <button class="action-btn action-sell" id="giftDetailSellBtn" onclick="sellCurrentGift()">
              Продати за ⭐ <span id="giftDetailSellPrice"></span>
            </button>
            <button class="action-btn action-upgrade-inv" onclick="upgradeFromInventory()">
              Улучшити
            </button>
            <button class="action-btn action-withdraw" onclick="withdrawCurrentGift()">
              Вивести
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Confetti container -->
    <div id="confetti-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
